name: ahb2apb-verification-ci

on:
  push:
  pull_request:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run regression
        run: make test
